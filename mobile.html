<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/assets/fis-logo.png" />
    <title>Emerald Feedback Wall - Mobile</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        if (window.__emeraldGanttShortcutBound) return;
        window.__emeraldGanttShortcutBound = true;
        window.addEventListener("keydown", function (event) {
          const t = event.target;
          if (t && t.tagName && /^(INPUT|TEXTAREA|SELECT)$/.test(t.tagName)) return;
          if (t && t.isContentEditable) return;
          const key = String(event.key || "").toLowerCase();
          if (!event.ctrlKey || event.metaKey || !event.shiftKey || key !== "m") return;
          event.preventDefault();
          window.open("/assets/fis-emerald-gantt.html", "_blank", "noopener,noreferrer");
        });
      })();
    </script>
    <script type="module" src="/src/mobile-main.tsx"></script>
  </body>
</html>
